services:
  frontend:
    image: ${OH_TOLOGY_FRONTEND_IMAGE:-oh-tology-frontend:latest}
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    image: ${OH_TOLOGY_BACKEND_IMAGE:-oh-tology-backend:latest}
    environment:
      ALIGNMENT_EXTRACTION_MODE: ${ALIGNMENT_EXTRACTION_MODE:-auto}
      ALIGNMENT_LLM_PROVIDER: ${ALIGNMENT_LLM_PROVIDER:-auto}
      ALIGNMENT_OPENAI_API_KEY: ${ALIGNMENT_OPENAI_API_KEY:-}
      ALIGNMENT_OPENAI_MODEL: ${ALIGNMENT_OPENAI_MODEL:-gpt-5.4}
      ALIGNMENT_OPENAI_BASE_URL: ${ALIGNMENT_OPENAI_BASE_URL:-}
      ALIGNMENT_OPENAI_ORGANIZATION: ${ALIGNMENT_OPENAI_ORGANIZATION:-}
      ALIGNMENT_OPENAI_PROJECT: ${ALIGNMENT_OPENAI_PROJECT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      ALIGNMENT_LLM_TEMPERATURE: ${ALIGNMENT_LLM_TEMPERATURE:-0}
      ALIGNMENT_EXTRACTION_MAX_CONCURRENCY: ${ALIGNMENT_EXTRACTION_MAX_CONCURRENCY:-4}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      OH_TOLOGY_FRONTEND_ROOT: /data/frontend
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/library:/data/frontend/library
