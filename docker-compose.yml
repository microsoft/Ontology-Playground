services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_ALIGNMENT_API_BASE_URL: /backend-api
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    environment:
      ALIGNMENT_EXTRACTION_MODE: ${ALIGNMENT_EXTRACTION_MODE:-auto}
      ALIGNMENT_LLM_PROVIDER: ${ALIGNMENT_LLM_PROVIDER:-openai}
      ALIGNMENT_OPENAI_API_KEY: ${ALIGNMENT_OPENAI_API_KEY:-}
      ALIGNMENT_OPENAI_MODEL: ${ALIGNMENT_OPENAI_MODEL:-gpt-5.4}
      ALIGNMENT_OPENAI_BASE_URL: ${ALIGNMENT_OPENAI_BASE_URL:-}
      ALIGNMENT_OPENAI_ORGANIZATION: ${ALIGNMENT_OPENAI_ORGANIZATION:-}
      ALIGNMENT_OPENAI_PROJECT: ${ALIGNMENT_OPENAI_PROJECT:-}
      ALIGNMENT_LLM_TEMPERATURE: ${ALIGNMENT_LLM_TEMPERATURE:-0}
      ALIGNMENT_EXTRACTION_MAX_CONCURRENCY: ${ALIGNMENT_EXTRACTION_MAX_CONCURRENCY:-4}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      OH_TOLOGY_FRONTEND_ROOT: /data/frontend
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/library:/data/frontend/library
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-12345678}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
